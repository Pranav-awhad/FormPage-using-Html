<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Page</title>
    <style>
        body {
            background-color: blanchedalmond;
        }
        h2 {
            display: flex;
            justify-content: center;
            border : 2px solid black;
            color: blue;
        }
        button {
            background-color: floralwhite;
        }
        input[type="reset"]{
            background-color: floralwhite;
        }
    </style>
</head>
<body>
    <h2>My Form Page</h2>
    <form action=""> 
        <fieldset>      <!-- Fieldset is used to group the relative tags together-->
            <br>
            <legend>Personal Details</legend>    <!-- Legend is used to give label for the field set-->
        <label for="Captcha">Enter Captcha <span style="color: red;">*</span></label>         <!-- Here for attribute is used to link between input tag and label tag -->
        <input type="text" id="Captcha" name="Captcha" placeholder="Enter Captcha Here" title="Enter Captcha in 30 Seconds." required>          <!-- required is used for mandatory purpose AND name attribute is used to submmit data to url-->         <!-- id attribute is used to define the input tag -->
        <br> <br>
        <label for="Username">Enter Username: </label>
        <input type="text" id="Username" name="Username" placeholder="Enter Username Here" title="Username Length 20 words"> 
        <br> <br>
        <label for="Email">Enter Email: </label>
        <input type="email" id="Email" name="Email" placeholder="Enter Email Here" title="Enter Valid Email">
        <br><br>
        <label for="ps">Enter Password: </label>
        <input type="password" id="ps" name="Password" placeholder="Enter Password" autocomplete="off">  <!-- By Autocomplete off we wont get suggesstion of the password previously entered-->
        <br><br>
        <label for="mobile">Enter Mobile No: </label>
        <input type="tel" id="mobile" name="Mobile" placeholder="Enter Mobile No.">     <!-- tel is used to  give  telephone numbers -->
        <br><br>
        <label for="age">Enter Age: </label>
        <input type="number" id="age" name="Age" placeholder="Enter Age Here" min="1" max="200">
        <br><br>
        <label for="DOB">Enter DOB: </label>
        <input type="date" id="DOB" name="DOB">
        <br><br>
        <label for="DOB">Enter DOB with time: </label>
        <input type="datetime-local" id="DOB with time" name="DOB with time">
        <br><br>    
        </fieldset>
        <br>

        <fieldset>
            <br>
            <legend>General Details</legend>
        <label for="time">Enter Show Time: </label>
        <input type="time" id="time" name="Time">
        <br><br>
        <label for="url">Enter Website Url: </label>
        <input type="url" id="url" name="URL">
        <br><br>
        <label>         <!-- Inorder to give the value to the server we use value attribute along with name-->
        <input type="checkbox" name="op1" value="html">HTML                  
        </label>
        <label>
        <input type="checkbox" name="op2" value="css">CSS
        </label>
        <label>
        <input type="checkbox" name="op3" value="Js">JavaScript
        </label>
        <br><br>
        <label>Enter Gender: </label>
        <label>
        <input type="radio" name="gender" value="M">Male                
        </label>                                 <!-- Inorder to specify Single choice of radio button we have to give same name for both input tags-->
        <label>
        <input type="radio" name="gender" value="F">Female
        </label>
        <br><br>
        <label>Upload PAN Card:</label>
        <input type="file" accept=".pdf , .jpg">
        <br><br>
        <label>Rate Fo the HTML:</label>
        <input type="range" min="1" max="10" name="rating" value="1">  <!-- Value is the default-->
        <br><br>
        <label for="color">Select your Fav Color:</label>
        <select name="fav-color" id="color" size="3">  <!-- size is used to limit the dropbox to be visible-->           <!-- Select tag is used for dropdown box-->
            <option value="pink">Pink</option>
            <option value="blue">Blue</option>          <!-- if you specify value then it will be stored else the option value will be stored-->
            <option value="white">White</option>
            <option value="black" selected>Black</option>      <!-- ByDefault it will be selected first-->
        </select>
        </fieldset>

        <br><br>
        <label for="feedback">Enter Feedback: </label>
        <textarea name="feedback" id="feedback" placeholder="Enter Feedback Here..." rows="5" cols="50"></textarea>
        <br><br>
        <button type="submit">Submit</button>
        <input type="reset" value="Cancel">       <!-- Through this input we can specify button tag --> <!-- Type is used to specify the  input work, value is used to give name to the button-->
    </form>
</body>
</html>
